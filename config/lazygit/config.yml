# Lazygit configuration
# Reference: https://github.com/jesseduffield/lazygit/blob/master/docs/Config.md

gui:
  showIcons: true
  nerdFontsVersion: "3"
  sidePanelWidth: 0.25
  expandFocusedSidePanel: true

git:
  paging:
    colorArg: always
    pager: delta --paging=never --color-only
  merging:
    manualCommit: false

keybinding:
  universal:
    quit: q
