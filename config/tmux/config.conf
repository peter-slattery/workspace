# Make prefix Ctrl-a (optional but common)
set -g prefix C-b
unbind C-b
bind C-b send-prefix

# Reload config easily
bind r source-file ~/.tmux.conf \; display "reloaded"

# Start windows/panes at 1 (more human-friendly)
set -g base-index 1
setw -g pane-base-index 1

# Don't rename windows automatically (important for sanity)
set -g allow-rename off

# Mouse Interaction
set -g mouse on

# Colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Keybindings
## TODO: Figure out how to bind a key shortcut to 'refresh-client -S'

## Pane Splitting
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

## Navigation (vim-like)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

## Pane Resizing
bind -n C-H resize-pane -L 5
bind -n C-J resize-pane -D 5
bind -n C-K resize-pane -U 5
bind -n C-L resize-pane -R 5

## Window Switching
bind -n C-n next-window
bind -n C-N previous-window

## Kill Pane
bind x kill-pane

## Sessions
bind s choose-tree

# Clipboard
set -g set-clipboard on

##if MACOS
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
##elif LINUX
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
##endif

setw -g mode-keys vi

bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# History
set -g history-limit 50000

# Escape Response
set -s escape-time 10

# Window Behavior
setw -g aggressive-resize on
set -g renumber-windows on

# Status Bar
set -g status-position bottom
set -g status-interval 2

set -g status-left "#S "
set -g status-right "%Y-%m-%d %H:%M"


